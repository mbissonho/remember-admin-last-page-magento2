services:
  playwright:
    image: mcr.microsoft.com/playwright:v1.50.1
    shm_size: 1gb
    ipc: host
    cap_add:
      - SYS_ADMIN
    networks:
      - backend
    environment:
      - MAGENTO_BASE_URL
      - MAGENTO_ADMIN_USERNAME
      - MAGENTO_ADMIN_PASSWORD
      - CI
      # Tell global-setup.js to run the Magento CLI inside the e2e-magento2 container
      # (reached through the mounted Docker socket below).
      - MAGENTO_CLI_IN_CONTAINER
      - MAGENTO_CLI_CONTAINER
      - MAGENTO_CLI_CONTAINER_USER
      - MAGENTO_ROOT
    volumes:
      - ../../../:/tmp/module
      # Lets the Playwright container reach the host Docker daemon so global-setup.js
      # can `docker exec` into the Magento container to verify the store scenario.
      - /var/run/docker.sock:/var/run/docker.sock
networks:
  backend:
