# LOCAL-ONLY workflow for running the integration tests with `gh act`.
#
# It mirrors the `run` job of ../../integration-tests.yml but WITHOUT the
# `services:` block. nektos/act (issue #944) does not make a job service's
# hostname resolvable from a Docker *container action* (which is what the extdn
# action is), so under act the action fails with:
#   nc: getaddrinfo for host "mysql" ... Temporary failure in name resolution
# On top of that, act still starts those services and publishes 3306/9200,
# causing port conflicts. Dropping `services:` here removes both problems; the
# MySQL/Elasticsearch dependencies come from docker-compose.yml in this folder
# instead, on a shared network that the extdn action is attached to via
# `act --network`.
#
# This file lives under .github/workflows/<subdir>/, which GitHub never executes
# (GitHub only runs workflows directly in .github/workflows/), so it stays
# strictly local.
#
# Usage:
#   docker compose -f .github/workflows/integration-tests/docker-compose.yml up -d --wait
#   gh act push -W .github/workflows/integration-tests/act-integration.yml -j run \
#     --network integration-local
#   docker compose -f .github/workflows/integration-tests/docker-compose.yml down -v
#
# Keep the matrix and the step below in sync with ../../integration-tests.yml.

name: Integration Tests (local/act)
on:
  push:
  workflow_dispatch:
jobs:
  run:
    strategy:
      matrix:
        php-version: [ "8.4" ]
        magento-version: [ "2.4.8-p5" ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Magento ${{ matrix.magento-version }} Integration Tests (Php${{ matrix.php-version }})
        uses: extdn/github-actions-m2/magento-integration-tests/8.4@master
        with:
          module_name: Mbissonho_RememberAdminLastPage
          composer_name: mbissonho/module-remember-admin-last-page
          magento_version: ${{ matrix.magento-version }}